# ManualIQ NeMo Guardrails Configuration
#
# Main configuration for input/output rails.
# Reference: ARCHITECTURE.md Section 3.16, KNOWN_ISSUES.md Section 4.1-4.3
#
# Uses Gemini Flash (our routing model) for self-check rails instead of
# OpenAI, since ManualIQ only uses Claude + Gemini as LLM providers.
# Custom actions (PII, injection) don't need an LLM at all.

models:
  - type: main
    engine: google
    model: gemini-2.0-flash
    parameters:
      temperature: 0.1
      max_tokens: 256

# Input rails: run BEFORE the query reaches the RAG pipeline.
# Order matters: cheap pattern checks first, LLM-based check last.
input_flows:
  - check prompt injection
  - check pii input
  - self check input

# Output rails: run AFTER the LLM generates a response.
output_flows:
  - check pii output
  - check language output
  - self check output

# Rails configuration.
rails:
  input:
    flows:
      - check prompt injection
      - check pii input
      - self check input
  output:
    flows:
      - check pii output
      - check language output
      - self check output

# Safety settings.
safety:
  jailbreak_detection: true

# Limit LLM calls for guardrail checks to keep latency low.
max_tokens: 256
